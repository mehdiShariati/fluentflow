# Build MkDocs site and deploy to GitHub Pages.
# Prerequisite: Settings → Pages → Source = GitHub Actions.

name: Deploy documentation

# Push to main always rebuilds Pages so the site is never stuck on “never deployed”
# (path-only filters are easy to miss and cause 404 on github.io until a doc file changes).
on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "VISION.md"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs
        run: pip install -r requirements-docs.txt
      - name: Build site
        run: mkdocs build
      - name: Upload Pages artifact
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
